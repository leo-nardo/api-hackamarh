name: CLI tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  static-relational:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Run static generator suite (relational)
        run: npm run test:generators:relational

  crud-relational:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Run CRUD generator suite (relational)
        run: npm run test:e2e:generators:relational:docker
